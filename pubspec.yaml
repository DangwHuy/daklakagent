name: daklakagent
description: "A new Flutter project."

version: 1.0.0+1

environment:
  sdk: ^3.9.2


dependencies:
  flutter:
    sdk: flutter
  flutter_markdown: ^0.7.3
  fl_chart: ^0.69.0
  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  firebase_core: ^4.2.1
  firebase_auth: ^6.1.2
  cloud_firestore: ^6.1.0
  firebase_messaging: ^16.1.3
  http: ^1.6.0
  intl: ^0.18.1  # ← Thêm cái này nếu chưa có
  geolocator: ^13.0.1
  image_picker: ^1.0.7  # Để chụp/chọn ảnh
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.5
  firebase_storage: ^13.2.0
  url_launcher: ^6.3.2
  uuid: ^4.4.2
  file_picker: ^8.1.2
  excel: ^4.0.6
  google_sign_in: '6.2.1'
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logoapp.png"
  min_sdk_android: 21 # optional, but good for removing errors

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/images/logoapp.png"

flutter:

  uses-material-design: true
  assets:
    - assets/images/
